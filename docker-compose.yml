services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_news_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${supabase_pass}@db.engepyysrjkmhxkumyit.supabase.co:5432/postgres
    networks:
      - app_network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_news_scheduler
    command: python -m scheduler.sch
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app_network
    restart: on-failure
    environment:
      - DATABASE_URL=postgresql://postgres:${supabase_pass}@db.engepyysrjkmhxkumyit.supabase.co:5432/postgres

networks:
  app_network:
    driver: bridge 
    
    